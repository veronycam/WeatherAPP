<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meteo App</title>
  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <div class="weather-app">

    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Enter a city..">
      <button onclick="searchCity()">Search</button>
    </div>

    <div class="current-weather">
      <div class="left">
        <h1 id="cityName">Johannesburg</h1>
        <p id="dateTime">Loading...</p>
        <p id="description">Weather description</p>
        <p>
          Humidity: <span id="humidity">--</span>,
          Wind: <span id="wind">--</span>
        </p>
      </div>

      <div class="right">
        <div class="icon">
          <img id="weatherIcon" src="" alt="Weather icon">
        </div>
        <div class="temperature">
          <span id="temperature">--</span>°C
        </div>
      </div>
    </div>

    <!-- Forecast section (dynamic now) -->
    <div class="forecast" id="forecast"></div>

  </div>

  <footer>
    This project was coded by 
    <a href="https://github.com/veronycam/" target="_blank">
      Pelaelo Molaba
    </a>, is 
    <a href="https://github.com/veronycam" target="_blank">
      open-sourced on GitHub
    </a> 
    and 
    <a href="https://meteo-shecodes-app.netlify.app/" target="_blank">
      hosted on Netlify
    </a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
